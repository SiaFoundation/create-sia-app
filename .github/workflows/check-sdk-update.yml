name: Check SDK Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get latest SDK version from npm
        id: latest
        run: |
          LATEST=$(npm view @siafoundation/sia-storage version)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get current SDK version from template
        id: current
        run: |
          CURRENT=$(node -p "require('./template/package.json').dependencies['@siafoundation/sia-storage'].replace('^', '')")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.latest.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "No new version available"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version available: ${{ steps.latest.outputs.version }}"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update template/package.json
        if: steps.compare.outputs.changed == 'true'
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('./template/package.json', 'utf8'));
            pkg.dependencies['@siafoundation/sia-storage'] = '^' + '$LATEST';
            fs.writeFileSync('./template/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install dependencies
        if: steps.compare.outputs.changed == 'true'
        run: cd template && bun install

      - name: Create changeset
        if: steps.compare.outputs.changed == 'true'
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          mkdir -p .changeset
          cat > .changeset/sdk-bump.md << EOF
          ---
          default: patch
          ---

          Bump @siafoundation/sia-storage to ${LATEST}
          EOF

      - name: Commit and push
        if: steps.compare.outputs.changed == 'true'
        run: |
          LATEST="${{ steps.latest.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add template/package.json template/bun.lock .changeset/sdk-bump.md
          git commit -m "chore: bump @siafoundation/sia-storage to ${LATEST}"
          git push
